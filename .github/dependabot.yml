version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
  - package-ecosystem: maven
    directory: /
    target-branch: releases/1.x
    ignore:
      - dependency-name: "org.testcontainers:*"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "org.springframework.boot:*"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "io.awspring.cloud:*"
        update-types: [ "version-update:semver-major" ]
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
  - package-ecosystem: github-actions
    directory: /
    target-branch: releases/1.x
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
