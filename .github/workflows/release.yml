name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual release)'
        required: false
        type: boolean
        default: false
      fallback-version:
        description: 'Fallback version if no git tag exists (e.g. 2.0.0)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Step 1: Calculate version from tags + commits, update POMs, tag, create GitHub Release
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-version: ${{ steps.changelog.outputs.version }}
      tag: ${{ steps.changelog.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: '${{ secrets.GIT_COMMIT_TOKEN }}'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git for commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect version from latest git tag
        id: current
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          FALLBACK_INPUT="${{ inputs.fallback-version }}"

          if [ -n "$LAST_TAG" ]; then
            VERSION="${LAST_TAG#v}"
          elif [ -n "$FALLBACK_INPUT" ]; then
            echo "::warning::No git tag found — using fallback version: $FALLBACK_INPUT"
            VERSION="$FALLBACK_INPUT"
          else
            echo "::error::No git tag found and no fallback-version provided. Run the workflow again with a fallback-version input."
            exit 1
          fi

          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          echo "fallback=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### 🔎 Version detection" >> "$GITHUB_STEP_SUMMARY"
          echo "- Last tag: ${LAST_TAG:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fallback input: ${FALLBACK_INPUT:-not set}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resolved base: $VERSION (Major: $MAJOR, Minor: $MINOR, Minor: $PATCH)" >> "$GITHUB_STEP_SUMMARY"

      - name: Calculate version and generate changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@91be4f3188da74fe85de9caffcebc80b26d43b5b # v6.3.0
        with:
          skip-version-file: 'true'
          skip-commit: 'true'
          skip-tag: 'true'
          git-push: 'false'
          fallback-version: ${{ steps.current.outputs.fallback }}
        env:
          CURRENT_MAJOR: ${{ steps.current.outputs.major }}
          CURRENT_MINOR: ${{ steps.current.outputs.minor }}

      - name: Calculate next SNAPSHOT version
        id: snapshot
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "next-snapshot=${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Set release version in POMs
        run: mvn -B versions:set -DnewVersion=${{ steps.changelog.outputs.version }} -DgenerateBackupPoms=false

      - name: Commit release version, tag, and push
        if: inputs.dry-run != true
        run: |
          git add -A
          git commit -m "chore(release): ${{ steps.changelog.outputs.version }} [skip ci]"
          git tag "${{ steps.changelog.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.changelog.outputs.tag }}"

      - name: Set next SNAPSHOT version
        run: mvn -B versions:set -DnewVersion=${{ steps.snapshot.outputs.next-snapshot }} -DgenerateBackupPoms=false

      - name: Commit next SNAPSHOT version
        if: inputs.dry-run != true
        run: |
          git add -A
          git commit -m "chore(release): prepare next development iteration ${{ steps.snapshot.outputs.next-snapshot }} [skip ci]"
          git push origin HEAD

      - name: Create GitHub Release
        if: inputs.dry-run != true
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}

      - name: Summary
        run: |
          SUFFIX=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then SUFFIX=" (dry-run)"; fi
          echo "### 🚀 Release Summary${SUFFIX}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.changelog.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.changelog.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Next Snapshot:** ${{ steps.snapshot.outputs.next-snapshot }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Changelog" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> "$GITHUB_STEP_SUMMARY"

  # Step 2: Build from tag and publish to Maven Central
  publish:
    needs: prepare
    if: inputs.dry-run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build and publish to Maven Central
        run: mvn -B -Ppublishing deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  # Step 3: Run security scanners against the release tag
  security-scan:
    needs: prepare
    if: inputs.dry-run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: java-kotlin

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build for analysis
        run: mvn -B compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Submit Dependency Snapshot
        uses: advanced-security/maven-dependency-submission-action@b275d12641ac2d2108b2cbb7598b154ad2f2cee8 # v5.0.0